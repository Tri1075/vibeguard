name: 'vibeguard'
description: 'Run the vibeguard gates (clean-code rules for AI-written code) and fail the job on blocking findings.'
branding:
  icon: 'shield'
  color: 'purple'
inputs:
  command:
    description: 'vibeguard arguments (e.g. "check --ci" or "check secure-code --ci")'
    required: false
    default: 'check --ci'
  version:
    description: 'vibeguard npm version to run (pin to a release; "latest" auto-runs new publishes)'
    required: false
    default: '0.1.0'
  working-directory:
    description: 'project directory'
    required: false
    default: '.'
runs:
  using: 'composite'
  steps:
    - name: Run vibeguard
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      # Inputs are passed through env, never interpolated into the script: a
      # `${{ }}` expansion of caller-controlled data into `run:` would be shell
      # injection. Shell metacharacters inside an env value are not re-parsed as
      # syntax, so $VG_COMMAND only ever word-splits into npx arguments.
      env:
        VG_VERSION: ${{ inputs.version }}
        VG_COMMAND: ${{ inputs.command }}
      run: npx -y "vibeguard@$VG_VERSION" $VG_COMMAND
