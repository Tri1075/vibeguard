name: 🐛 Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: Running `vibeguard check` on ... produced ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: vibeguard-pack version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: macOS 15, Node 22, Claude Code
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / logs
      description: Paste the relevant output (use `--json` if helpful).
      render: shell
