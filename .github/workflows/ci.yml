name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: node dist/bin.js -C . check # dogfood: the pack passes its own gates
      # Plugin skills must match the TS source. `git diff` ignores untracked
      # files, so a NEW skill added in source but never committed would slip
      # through — stage first, then diff the index, to catch additions too.
      - run: node scripts/emit-plugin.mjs && git add -A skills/ && git diff --cached --exit-code skills/
